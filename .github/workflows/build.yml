name: Build WoW Launcher
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore AmarothLauncher/AmarothLauncher.sln

      - name: Build Solution
        run: msbuild AmarothLauncher/AmarothLauncher.sln /p:Configuration=Release
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-Ejecutable
          path: AmarothLauncher/bin/Release/
